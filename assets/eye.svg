<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <!-- Glow filter matching .shadow(color: magicGreen 0.6, radius: 6) scaled up -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.24
                0 0 0 0 0.84
                0 0 0 0 0.14
                0 0 0 0.6 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring: eye socket — circle scaled to 0.8 vertically -->
  <!-- diameter=256, so rx=128, ry=128*0.8=102.4 -->
  <ellipse cx="150" cy="150" rx="128" ry="102.4" filter="url(#glow)"
    fill="rgb(61, 214, 36)"
    stroke="rgba(61, 214, 36, 0.666)" stroke-width="2.1"/>

  <!-- Iris — diameter*0.98=250.88, scaleY 0.666 → rx=125.44, ry=83.5 -->
  <ellipse cx="150" cy="150" rx="125.44" ry="83.5"
    fill="white"
    stroke="rgba(0, 0, 0, 0.36)" stroke-width="1.25"/>

  <!-- Pupil — diameter*0.333*0.666 = 56.8 diameter → r=28.4 -->
  <circle cx="150" cy="150" r="28.4" fill="black"/>
</svg>

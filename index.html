<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riffer Madness</title>
  <link rel="icon" type="image/x-icon" href="assets/eye.svg">
  <meta name="description" content="An iOS App for musical brainstorming.">
  <meta property="og:title" content="Riffer Madness">
  <meta property="og:description" content="An iOS App for musical brainstorming.">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'magic-green':  'rgb(61, 214, 36)',
            'magic-orange': 'rgb(232, 89, 15)',
            'magic-red':    'rgb(212, 33, 15)',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['SF Mono', 'Menlo', 'Consolas', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    /* Smooth fade-in on scroll */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Phone frame placeholder */
    .phone-frame {
      aspect-ratio: 9 / 19.5;
      max-height: 480px;
    }
    /* Screenshot carousel */
    #carousel-track { will-change: transform; }
    .carousel-dot { transition: background-color 0.3s, transform 0.3s; }
    .carousel-dot.active { background-color: rgb(232, 89, 15); transform: scale(1.4); }
    /* Prevent single-word "widow" lines in the carousel description */
    #carousel-desc { text-wrap: pretty; }
    /* Trim empty space around screenshot content: scale up from the center
       so top, bottom, and sides all clip against the slide. */
    .carousel-slide { overflow: hidden; display: flex; justify-content: center; }
    .carousel-slide img {
      filter: drop-shadow(0 0 66px rgba(61, 214, 36, 1.0));
      transform: scale(1.4);
      transform-origin: center center;
      min-width: 400px;
    }
  </style>
</head>
<body class="bg-black text-gray-200 font-sans antialiased">

  <!-- ============ HERO ============ -->
  <section id="hero" class="px-[36px] pt-[66px] md:pt-[132px]">
    <div class="max-w-4xl mx-auto text-center">

      <h1 class="text-6xl md:text-7xl font-bold text-magic-orange tracking-tight mb-3">
        Riffer Madness
      </h1>
      <p class="md:text-lg text-gray-500 max-w-xl mx-auto">
        An iOS application for musical brainstorming.
      </p>

      <a href="https://apps.apple.com/us/app/riffer-madness/id6762950087?itscg=30200&itsct=apps_box_badge&mttnsubad=6762950087"
         class="inline-block mt-6">
        <img src="https://toolbox.marketingtools.apple.com/api/v2/badges/download-on-the-app-store/black/en-us?releaseDate=1778198400"
             alt="Download on the App Store"
             class="w-[198px] h-[66px] align-middle object-contain" />
      </a>
    </div>
  </section>

  <!-- ============ DETAILS (Instructions + Concepts) ============ -->
  <section id="details" class="bg-black">
    <div class="max-w-5xl mx-auto fade-in">

      <!-- Screenshot Carousel -->
      <div class="relative mx-auto">
        <div class="overflow-hidden rounded-2xl relative">
          <div id="carousel-track" class="flex transition-transform duration-500 ease-in-out">
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.001.png" alt="The Library — tap the Eye button to record a Riff" class="w-full" />
            </div>
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.002.png" alt="Set BPM and record" class="w-full" />
            </div>
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.003.png" alt="Riff Editor — clip the audio" class="w-full" />
            </div>
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.004.png" alt="The Library — select slots to compose" class="w-full" />
            </div>
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.005.png" alt="Composition Canvas — arrange slots" class="w-full" />
            </div>
            <div class="carousel-slide w-full shrink-0">
              <img src="assets/images/riffer-madness.006.png" alt="The Library — share your creation" class="w-full" />
            </div>
          </div>

          <!-- Caption banner: overlays the image on sm+, flows below on mobile to avoid covering content -->
          <div class="px-6 py-4 text-center max-w-xl mx-auto">
            <h3 id="carousel-title" class="text-lg font-semibold text-white"></h3>
            <p id="carousel-desc" class="text-white/80 text-sm mt-1"></p>
            <div class="flex justify-center gap-2.5 mt-3">
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 active cursor-pointer" data-slide="0" aria-label="Slide 1"></button>
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 cursor-pointer" data-slide="1" aria-label="Slide 2"></button>
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 cursor-pointer" data-slide="2" aria-label="Slide 3"></button>
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 cursor-pointer" data-slide="3" aria-label="Slide 4"></button>
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 cursor-pointer" data-slide="4" aria-label="Slide 5"></button>
              <button class="carousel-dot w-2.5 h-2.5 rounded-full bg-white/40 cursor-pointer" data-slide="5" aria-label="Slide 6"></button>
            </div>
          </div>
        </div>

        <!-- Prev / Next arrows -->
        <button id="carousel-prev" class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-10 h-10 rounded-full bg-black/80 text-white text-2xl hidden items-center justify-center hover:bg-magic-orange transition cursor-pointer" aria-label="Previous">&#8249;</button>
        <button id="carousel-next" class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-10 h-10 rounded-full bg-black/80 text-white text-2xl hidden items-center justify-center hover:bg-magic-orange transition cursor-pointer" aria-label="Next">&#8250;</button>
      </div>

    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <!-- Combined footer: contact email + legal links + copyright in a single responsive bar.
       Outer <footer> handles page padding; inner <div> handles the layout arrangement. -->
  <footer class="mt-[132px] px-[36px] pt-[36px] pb-[66px] border-t border-magic-green">
    <div class="max-w-xl mx-auto text-sm text-gray-600 fade-in flex flex-col sm:flex-row items-center justify-between gap-1">
      <a href="mailto:support@riffermadness.app" class="text-gray-300 hover:text-magic-orange transition">support@riffermadness.app</a>
      <div class="flex items-center gap-3">
        <a href="privacy.html" class="hover:text-gray-300 transition">Privacy</a>
        <span>|</span>
        <a href="terms.html" class="hover:text-gray-300 transition">Terms</a>
      </div>
      <span>&copy;2026 Riffer Madness</span>
    </div>
  </footer>

  <!-- ============ SCRIPTS ============ -->
  <script>
    // Scroll fade-in with Intersection Observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Screenshot carousel — auto-scrolls, pauses on user interaction, resumes after idle
    (function() {
      var track = document.getElementById('carousel-track');
      var dots = document.querySelectorAll('.carousel-dot');
      var titleEl = document.getElementById('carousel-title');
      var descEl = document.getElementById('carousel-desc');
      var SLIDE_COUNT = 6;
      var AUTO_INTERVAL = 6600;
      var PAUSE_DURATION = 66000;
      var current = 0, autoTimer = null, pauseTimer = null;

      var captions = [
        { title: '1. The Library', desc: 'The main hub, where you will manage all Riffs and Compositions. The Library Eye menu can filter and sort. It is also where you start a Riff, either through recording or file import.' },
        { title: '2. Record', desc: 'Everything in The Library has a BPM. If you have a target BPM for your Riff, set it up front when you record. You can change it later too, so no pressure.' },
        { title: '3. Riff Editor', desc: 'Riffs are essentially clips of audio with an assigned BPM. In the Riff editor, you adjust the clip boundaries and edit Riff metadata (name, BPM, tags).' },
        { title: '4. The Library', desc: 'Select slots in the library to perform actions on them. The Eye menu is context sensitive, showing actions whenever a slot is selected. This is where you start a Composition.' },
        { title: '5. Composition Canvas', desc: 'Arrange Riffs and other Compositions on a canvas, however you want (though no Composition can be longer than 10 minutes). The canvas provides tools for managing and arranging slots, as well as editing Composition metadata.' },
        { title: '6. The Library', desc: 'When you are happy with a Composition (or Riff) you can export the audio.' },
      ];

      // Replace the final space in a string with a non-breaking space so the
      // last two words wrap together, preventing single-word orphan lines.
      function noWidow(s) {
        return s.replace(/\s+(\S+)\s*$/, ' $1');
      }

      function go(n) {
        current = ((n % SLIDE_COUNT) + SLIDE_COUNT) % SLIDE_COUNT;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
        titleEl.textContent = captions[current].title;
        descEl.textContent = noWidow(captions[current].desc);
      }

      // Reserve enough vertical space in the description so panel changes don't
      // cause the page below to shift. Runs once after fonts/layout settle.
      function lockDescriptionHeight() {
        var saved = descEl.textContent;
        descEl.style.minHeight = '0px';
        var max = 0;
        captions.forEach(function(c) {
          descEl.textContent = c.desc;
          if (descEl.offsetHeight > max) max = descEl.offsetHeight;
        });
        descEl.style.minHeight = max + 'px';
        descEl.textContent = saved;
      }
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(lockDescriptionHeight);
      } else {
        window.addEventListener('load', lockDescriptionHeight);
      }

      function startAuto() { stopAuto(); autoTimer = setInterval(function() { go(current + 1); }, AUTO_INTERVAL); }
      function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
      function userAction() {
        stopAuto();
        clearTimeout(pauseTimer);
        pauseTimer = setTimeout(startAuto, PAUSE_DURATION);
      }

      document.getElementById('carousel-prev').addEventListener('click', function() { go(current - 1); userAction(); });
      document.getElementById('carousel-next').addEventListener('click', function() { go(current + 1); userAction(); });
      dots.forEach(function(dot) {
        dot.addEventListener('click', function() { go(+dot.dataset.slide); userAction(); });
      });

      // Touch swipe support
      var startX = 0;
      track.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
      track.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 50) { dx > 0 ? go(current - 1) : go(current + 1); userAction(); }
      });

      go(0);
      startAuto();
    })();
  </script>

</body>
</html>
